spring.application.name=ecommerce

spring.profiles.active=${APP_PROFILE:dev}
spring.jpa.open-in-view=false
spring.cache.type=none

security.oauth2.client.client-id=${CLIENT_ID:myclientid}
security.oauth2.client.client-secret=${CLIENT_SECRET:myclientsecret}

jwt.secret=${JWT_SECRET:my-very-secret-key-for-jwt-signing-must-be-256bits}
jwt.duration=${JWT_DURATION:86400}

cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,https://ecommerce.felipelohan.com}
